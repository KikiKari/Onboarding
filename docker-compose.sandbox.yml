# Zusatz-Override NUR fuer die Claude-Code-Remote-Sandbox.
#
#   docker compose -f docker-compose.dev.yml -f docker-compose.sandbox.yml up -d
#
# Hintergrund: In der Sandbox laeuft aller Container-Egress durch einen
# transparenten TLS-Proxy (MITM mit eigener CA unter /root/.ccr/ca-bundle.crt).
# Der Host vertraut dieser CA, Container nicht — pip/npm schlagen dort mit
# CERTIFICATE_VERIFY_FAILED fehl. Dieses Override reicht die CA in die
# Container und ersetzt den Backend-Image-Build durch einen Runtime-Install
# (der Build-Container kann die CA nicht mounten).
#
# Auf der lokalen Nutzer-Maschine wird diese Datei NICHT verwendet.

services:
  backend:
    image: python:3.12-slim
    build: !reset null
    working_dir: /srv
    command:
      - sh
      - -c
      - |
        export PIP_CACHE_DIR=/pip-cache
        STAMP=/pip-cache/.requirements.md5
        HASH=$$(md5sum requirements.txt | cut -d' ' -f1)
        if [ ! -f "$$STAMP" ] || [ "$$(cat "$$STAMP")" != "$$HASH" ] || ! python -c 'import fastapi' 2>/dev/null; then
          echo '[sandbox] installiere Backend-Dependencies …'
          pip install -q -r requirements.txt && echo "$$HASH" > "$$STAMP"
        fi
        exec uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    environment:
      PIP_CERT: /ccr-ca.crt
      SSL_CERT_FILE: /ccr-ca.crt
      REQUESTS_CA_BUNDLE: /ccr-ca.crt
    volumes:
      - ./backend:/srv
      - backend_pip_cache:/pip-cache
      - /root/.ccr/ca-bundle.crt:/ccr-ca.crt:ro

  frontend:
    environment:
      NODE_EXTRA_CA_CERTS: /ccr-ca.crt
    volumes:
      - .:/app
      - frontend_node_modules:/app/node_modules
      - frontend_next_cache:/app/.next
      - /root/.ccr/ca-bundle.crt:/ccr-ca.crt:ro

volumes:
  backend_pip_cache:
