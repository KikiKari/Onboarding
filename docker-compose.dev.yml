# Dev-Stack mit Hot-Reload — eigenständige Datei, ersetzt docker-compose.yml NICHT.
#
# Start:   docker compose -f docker-compose.dev.yml up -d
# Stop:    docker compose -f docker-compose.dev.yml down
#
# Der Quellcode wird als Bind-Mount eingehängt: jede per Git gezogene Änderung
# erscheint ohne Rebuild auf localhost:3000 (Next-Dev-Server) bzw. :8000
# (uvicorn --reload). node_modules lebt in einem benannten Volume und wird nur
# neu installiert, wenn sich package-lock.json geändert hat (Hash-Stempel).
# Ein Image-Rebuild ist nur noch bei Dockerfile-/requirements-Änderungen nötig
# — das übernimmt scripts/sync-local.ps1 (siehe docs/SYNC.md).

services:
  backend:
    build:
      context: ./backend
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    environment:
      CONTACT_ALLOWED_ORIGINS: http://localhost:3000
    volumes:
      - ./backend/app:/app/app
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 10s
      timeout: 3s
      retries: 5

  frontend:
    image: node:22-alpine
    working_dir: /app
    command:
      - sh
      - -c
      - |
        STAMP=node_modules/.package-lock.md5
        HASH=$$(md5sum package-lock.json | cut -d' ' -f1)
        if [ ! -f "$$STAMP" ] || [ "$$(cat "$$STAMP")" != "$$HASH" ]; then
          echo '[dev] package-lock.json geändert — npm install …'
          npm install --no-audit --no-fund && echo "$$HASH" > "$$STAMP"
        else
          echo '[dev] Dependencies unverändert — überspringe npm install'
        fi
        exec npm run dev
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://localhost:8000
      # Bind-Mounts unter Docker Desktop/WSL liefern keine Inotify-Events vom
      # Windows-Dateisystem — Polling hält den Hot-Reload zuverlässig.
      WATCHPACK_POLLING: "true"
      CHOKIDAR_USEPOLLING: "true"
    volumes:
      - .:/app
      - frontend_node_modules:/app/node_modules
      - frontend_next_cache:/app/.next
    ports:
      - "3000:3000"
    depends_on:
      backend:
        condition: service_healthy

volumes:
  frontend_node_modules:
  frontend_next_cache:
